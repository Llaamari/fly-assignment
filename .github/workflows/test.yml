name: Simple CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Node version
        run: node -v

      - name: Install dependencies
        run: npm install

      - name: Run simple test
        run: echo "Pipeline works!"